<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PGM Map Studio — Configure</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='tokens.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='editor.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='components.css') }}"/>
</head>
<body>
<div id="topbar">
  <a href="/" class="topbar-breadcrumb-home" title="Back to dashboard">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Maps</span>
  </a>
  <span class="topbar-sep">›</span>
  <span id="topbar-map-name" class="topbar-crumb">{{ map_name }}</span>
  <span class="topbar-sep">›</span>
  <span class="topbar-crumb topbar-crumb--dim">Configure</span>
  <div class="topbar-right">
    <div id="topbar-error" role="alert"><span class="topbar-error-text"></span></div>
  </div>
</div>
<div style="padding:24px;color:var(--text-muted);font-size:13px">
  Configure page coming in M2 (scan layer, island exclusions, symmetry confirmation).
</div>
</body>
</html>
