<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PGM Map Studio — Configure</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='tokens.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='editor.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='components.css') }}"/>
</head>
<body>
<div id="topbar">
  <a href="/" class="topbar-breadcrumb-home" title="Back to dashboard">
    <i data-lucide="house"></i>
    <span>Maps</span>
  </a>
  <span class="topbar-sep">›</span>
  <span id="topbar-map-name" class="topbar-crumb">{{ map_name }}</span>
  <span class="topbar-sep">›</span>
  <span class="topbar-crumb topbar-crumb--dim">Configure</span>
  <div class="topbar-right">
    <div id="topbar-error" role="alert">
      <span class="topbar-error-text"></span>
      <button class="topbar-error-dismiss" id="error-dismiss-btn"><i data-lucide="x"></i></button>
    </div>
  </div>
</div>
<div class="page-placeholder">
  Configure page coming in M2 (scan layer, island exclusions, symmetry confirmation).
</div>
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons({ attrs: { "stroke-width": "1.5", width: "16", height: "16" } });</script>
</body>
</html>
